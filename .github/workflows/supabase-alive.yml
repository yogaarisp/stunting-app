name: Supabase Keep Alive

on:
  schedule:
    # Ping setiap 2 hari sekali jam 07:00 WIB (00:00 UTC)
    - cron: '0 0 */2 * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 🏓 Ping Supabase REST API
        run: |
          echo "========================================"
          echo "  NutriTrack - Supabase Keep Alive"
          echo "  Waktu: $(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo "========================================"

          SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
          SUPABASE_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"

          # Trim whitespace/newline jika ada
          SUPABASE_URL=$(echo "$SUPABASE_URL" | tr -d '[:space:]')
          SUPABASE_KEY=$(echo "$SUPABASE_KEY" | tr -d '[:space:]')

          # Validasi secrets
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "❌ ERROR: Secret belum di-set!"
            exit 1
          fi

          echo "✅ Secrets ditemukan"
          echo "🔗 Target URL length: ${#SUPABASE_URL} chars"
          echo ""

          # Ping 1: REST API root
          echo "📡 Ping 1: REST API..."
          STATUS_1=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            --url "${SUPABASE_URL}/rest/v1/" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" || echo "000")
          echo "   → HTTP Status: $STATUS_1"

          # Ping 2: Query tabel settings
          echo "📡 Ping 2: Query tabel settings..."
          STATUS_2=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            --url "${SUPABASE_URL}/rest/v1/settings?select=id&limit=1" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" || echo "000")
          echo "   → HTTP Status: $STATUS_2"

          # Ping 3: Query tabel menus
          echo "📡 Ping 3: Query tabel menus..."
          STATUS_3=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            --url "${SUPABASE_URL}/rest/v1/menus?select=id&limit=1" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" || echo "000")
          echo "   → HTTP Status: $STATUS_3"

          echo ""
          echo "========================================"

          # Cek minimal 1 berhasil
          if [[ "$STATUS_1" == 2* ]] || [[ "$STATUS_2" == 2* ]] || [[ "$STATUS_3" == 2* ]]; then
            echo "✅ BERHASIL! Supabase aktif dan tidak akan di-pause!"
          else
            echo "⚠️  WARNING: Semua ping gagal ($STATUS_1, $STATUS_2, $STATUS_3)"
            echo "   Cek apakah URL dan Key di Secrets sudah benar."
          fi
          echo "========================================"
